name: KisanPulse Autonomous Sync v21.26

on:
  schedule:
    # Runs every 3 hours (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Sharded Data Sync (Agri + Weather + NASA)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_OGD_API_KEY: ${{ secrets.OGD_API_KEY }}
          VITE_OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          # 🕒 15:00 UTC is ~8:30 PM IST (Daily Closing Slot)
          HOUR=$(date +%H)
          if [ "$HOUR" == "15" ]; then
            echo "[MODE] Launching Daily Mega-Pulse (Agri + Retail + History)..."
            node scripts/kisanbaba_sync_engine.cjs --mode=daily
          else
            echo "[MODE] Launching 3-Hourly Precision Shard (Weather + NASA)..."
            node scripts/kisanbaba_sync_engine.cjs --mode=pulse
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase

      - name: Daily Inference & Prediction
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/daily_inference.py

      - name: Commit Intelligence Update
        run: |
          git config --local user.email "ai-worker@kisanbaba.in"
          git config --local user.name "KisanBaba AI Worker"
          git add public/data/ceda/*.json || echo "No CEDA data to add"
          
          # Check for changes before committing
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 MISSION: KisanPulse Autonomous Sync [$(date +'%Y-%m-%d %H:%M')]"
            
            # Use rebase to handle concurrent infrastructure updates
            git pull --rebase origin main
            git push origin main
          fi
