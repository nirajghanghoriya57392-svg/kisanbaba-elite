name: KisanBaba PRO Daily AI Worker

on:
  schedule:
    # Run every 3 hours to capture Mid-Day Heat and Night Frost (High Precision)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual trigger

# REQUIRED: Enable the runner to push changes back to the repository
permissions:
  contents: write

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm install

      - name: High-Precision Data Sync (APMC + Weather)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_OGD_API_KEY: ${{ secrets.OGD_API_KEY }}
          VITE_OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          KISANBABA_PRECISION: 'high'
        run: node scripts/kisanbaba_sync_engine.cjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase

      - name: Daily Inference & Prediction
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/daily_inference.py

      - name: Commit Intelligence Update
        run: |
          git config --local user.email "ai-worker@kisanbaba.in"
          git config --local user.name "KisanBaba AI Worker"
          git add public/data/ceda/*.json
          git commit -m "🤖 High-Precision AI Update [$(date +'%Y-%m-%d %H:%M')] " || echo "No changes to commit"
          git push
